# Public RSS sources. Safe to commit.
# Private feeds go in config/sources.local.yaml (gitignored).
#
# Lookback window is controlled globally by LOOKBACK_MIN_HOURS (default 25h),
# which ensures weekend gaps (e.g. arXiv not publishing Sat/Sun) are covered
# automatically. Per-source lookback_hours is no longer supported.
#
# Fields:
#   name              display name
#   url               RSS/Atom feed URL
#   category          used for grouping in output
#   firecrawl_fulltext  true = fetch full article body via Firecrawl API

rss:
  # ── Databases & Data Platform ────────────────────────────────────────────────
  - name: ClickHouse Blog
    url: https://clickhouse.com/rss.xml
    category: Database
    firecrawl_fulltext: true

  - name: Databricks Blog
    url: http://databricks.com/feed
    category: Data Platform
    firecrawl_fulltext: true

  # ── AI / ML ──────────────────────────────────────────────────────────────────
  - name: Qdrant Blog
    url: https://qdrant.tech/articles/index.xml
    category: AI / Vector DB

  - name: NVIDIA Developer Blog
    url: https://developer.nvidia.com/blog/feed/
    category: AI / Infrastructure

  - name: Lilian Weng
